# Starship prompt — Catppuccin Mocha palette
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](surface0)\
$os\
$username\
[](bg:surface1 fg:surface0)\
$directory\
[](fg:surface1 bg:blue)\
$git_branch\
$git_status\
[](fg:blue bg:mauve)\
$python\
$nodejs\
$rust\
$golang\
[](fg:mauve)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[os]
disabled = false
style = "bg:surface0 fg:text"
[os.symbols]
Ubuntu = ""

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = '[ $user ]($style)'

[directory]
style = "fg:mantle bg:surface1"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music"     = ""
"Pictures"  = ""

[git_branch]
symbol = ""
style = "bg:blue"
format = '[[ $symbol $branch ](fg:base bg:blue)]($style)'

[git_status]
style = "bg:blue"
format = '[[($all_status$ahead_behind )](fg:base bg:blue)]($style)'

[nodejs]
symbol = ""
style = "bg:mauve"
format = '[[ $symbol ($version) ](fg:base bg:mauve)]($style)'

[python]
symbol = ""
style = "bg:mauve"
format = '[[ $symbol ($version) ](fg:base bg:mauve)]($style)'

[rust]
symbol = ""
style = "bg:mauve"
format = '[[ $symbol ($version) ](fg:base bg:mauve)]($style)'

[golang]
symbol = ""
style = "bg:mauve"
format = '[[ $symbol ($version) ](fg:base bg:mauve)]($style)'

[fill]
symbol = " "

[cmd_duration]
style = "fg:yellow"
format = "[󱑃 $duration ]($style)"
min_time = 2000

[time]
disabled = false
time_format = "%H:%M"
style = "fg:subtext1"
format = "[ $time ]($style)"

[character]
success_symbol = "[❯](fg:green)"
error_symbol   = "[❯](fg:red)"
