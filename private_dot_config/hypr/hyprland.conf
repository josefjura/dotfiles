# Hyprland config — Catppuccin Mocha
# https://wiki.hyprland.org/Configuring/

################
### NVIDIA   ###
################
# Required for Nvidia proprietary drivers
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

cursor {
    no_hardware_cursors = true
}

################
### MONITORS ###
################
monitor = ,preferred,auto,auto

#################
### AUTOSTART ###
#################
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = hypridle

#######################
### CATPPUCCIN MOCHA ##
#######################
$rosewater = rgba(f5e0dcee)
$flamingo  = rgba(f2cdcdee)
$pink      = rgba(f5c2e7ee)
$mauve     = rgba(cba6f7ee)
$red       = rgba(f38ba8ee)
$maroon    = rgba(eba0acee)
$peach     = rgba(fab387ee)
$yellow    = rgba(f9e2afee)
$green     = rgba(a6e3a1ee)
$teal      = rgba(94e2d5ee)
$sky       = rgba(89dcebee)
$sapphire  = rgba(74c7ecee)
$blue      = rgba(89b4faee)
$lavender  = rgba(b4befeee)
$text      = rgba(cdd6f4ee)
$surface0  = rgba(313244ee)
$base      = rgba(1e1e2eee)
$mantle    = rgba(181825ee)
$crust     = rgba(11111bee)

####################
### LOOK AND FEEL ##
####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $mauve $blue 45deg
    col.inactive_border = $surface0
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = true
    bezier = wind,    0.05, 0.9,  0.1,  1.05
    bezier = winIn,   0.1,  1.1,  0.1,  1.1
    bezier = winOut,  0.3,  -0.3, 0,    1
    bezier = liner,   1,    1,    1,    1

    animation = windows,     1, 6,  wind,  slide
    animation = windowsIn,   1, 6,  winIn, slide
    animation = windowsOut,  1, 5,  winOut, slide
    animation = windowsMove, 1, 5,  wind,  slide
    animation = border,      1, 1,  liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade,        1, 10, default
    animation = workspaces,  1, 5,  wind
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#################
### INPUT     ###
#################
input {
    kb_layout = us
    follow_focus = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

####################
### KEYBINDINGS  ###
####################
$mod = SUPER
$term = ghostty
$menu = fuzzel

# Core
bind = $mod,       Return, exec, $term
bind = $mod,       Q,      killactive
bind = $mod SHIFT, E,      exit
bind = $mod,       Space,  exec, $menu
bind = $mod,       F,      fullscreen, 0
bind = $mod SHIFT, F,      togglefloating

# Apps
bind = $mod,       E,      exec, ghostty -e yazi
bind = $mod,       G,      exec, ghostty -e lazygit
bind = $mod,       N,      exec, ghostty -e nvim
bind = CTRL SHIFT, Escape, exec, ghostty -e btop

# Notifications
bind = $mod, BackSpace, exec, swaync-client -t

# Clipboard history
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Screenshots
bind = ,       Print, exec, grim ~/Pictures/screenshot_$(date +%Y%m%d_%H%M%S).png
bind = SHIFT,  Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%Y%m%d_%H%M%S).png

# Window focus (vim-style)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Window move
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Resize / move with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Lock screen
bind = $mod, Delete, exec, hyprlock

###################
### WINDOW RULES ##
###################
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
