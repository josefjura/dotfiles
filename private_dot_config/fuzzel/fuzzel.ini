# Fuzzel launcher — Catppuccin Mocha
[main]
font=JetBrainsMono Nerd Font:size=14
dpi-aware=auto
prompt=
lines=10
width=40
horizontal-pad=16
vertical-pad=10
inner-pad=8
image-size-ratio=0.5
terminal=ghostty -e

[colors]
# Catppuccin Mocha
background=1e1e2eff
text=cdd6f4ff
match=cba6f7ff
selection=313244ff
selection-text=cdd6f4ff
selection-match=cba6f7ff
border=cba6f7ff

[border]
width=2
radius=10

[key-bindings]
cancel=Escape
